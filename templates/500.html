{% extends 'base.html' %}
{% block title %}Server Error{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="error-page my-5">
                <h1 class="display-1 fw-bold text-danger mb-0">500</h1>
                <h2 class="h3 mb-4">Internal Server Error</h2>
                <p class="text-muted mb-5">
                    Oops! Something went wrong on our end. We are looking into it.
                </p>
                <a href="{% url 'dashboard' %}" class="btn btn-primary btn-lg rounded-pill px-5">
                    <i class="fa-solid fa-arrow-left me-2"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
