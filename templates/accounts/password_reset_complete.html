{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card text-center">
        <div class="auth-header">
            <div class="auth-logo mx-auto">
                <span class="brand-icon-lg">✅</span>
            </div>
            <h1 class="auth-title">Password reset complete</h1>
            <p class="auth-subtitle">Your password has been set. You may go ahead and log in now.</p>
        </div>
        
        <a href="{% url 'login' %}" class="btn btn-primary btn-full mt-4">
            Log in to your account <i class="fa-solid fa-arrow-right ms-1"></i>
        </a>
    </div>
</div>
{% endblock %}
